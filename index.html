<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="theme-color" content="#2196f3">
<title>宮古島バスアプリ</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
#map { height: 80vh; }
#panel { padding:10px; background:#fff; }
.busIcon {
  font-size:20px;
  transform-origin:center;
}
  #map { height: 80vh; }
#panel { padding:10px; background:#fff; }
.busIcon {
  font-size:20px;
  transform-origin:center;
}

    body {
      margin: 0;
      font-family: sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
   
    /* 🔽 ボタンUI */
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      gap: 18px;
    }

    button {
      font-size: 42px;
      padding: 28px 42px;
      border-radius: 12px;
      border: none;
      background: #2c7be5;
      color: white;
    }
    
      button:active {
      background: #1a5fc1;
  }

    @media (max-width: 600px) {
      button {
        font-size: 42px;
        padding: 28px 42px;
      }
    }
</style>
</head>

<body>

<div id="panel">
<select id="routeSelect"></select>
<button onclick="showCurrent()">現在地</button>
<button onclick="showMiyako()">宮古島</button>
<button onclick="drawRoute()">路線表示</button>
<button onclick="startRealtime()">運行開始</button>
</div>

<div id="map"></div>

<script>

// =====================
// 地図
// =====================
var map = L.map('map').setView([24.8,125.36], 28);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// =====================
// データ
// =====================
let stops={}, stopTimes=[], trips={}, shapes={}, routes={};
let busMarkers=[];

// CSV読み込み
async function loadCSV(url){
  let res = await fetch(url);
  let text = await res.text();
  let lines = text.trim().split("\n");
  let headers = lines[0].split(",");

  return lines.slice(1).map(line=>{
    let cols = line.split(",");
    let obj = {};
    headers.forEach((h,i)=>obj[h]=cols[i]);
    return obj;
  });
}

// 時刻→秒
function toSec(t){
  let [h,m,s] = t.split(":").map(Number);
  return h*3600 + m*60 + s;
}

// 初期化
async function init(){

  let s = await loadCSV("stops.txt");
  let st = await loadCSV("stop_times.txt");
  let t = await loadCSV("trips.txt");
  let sh = await loadCSV("shapes.txt");
  let r = await loadCSV("routes.txt");

  s.forEach(v=>stops[v.stop_id]=v);
  stopTimes = st;
  t.forEach(v=>trips[v.trip_id]=v);
  r.forEach(v=>routes[v.route_id]=v);

  sh.forEach(v=>{
    if(!shapes[v.shape_id]) shapes[v.shape_id]=[];
    shapes[v.shape_id].push([
      parseFloat(v.shape_pt_lat),
      parseFloat(v.shape_pt_lon)
    ]);
  });

  makeRouteUI();
}

init();

// =====================
// 路線UI
// =====================
function makeRouteUI(){
  let sel = document.getElementById("routeSelect");

  Object.keys(routes).forEach(rid=>{
    let opt = document.createElement("option");
    opt.value = rid;
    opt.text = "路線 " + rid;
    sel.appendChild(opt);
  });
}

// =====================
// 現在地
// =====================
function showCurrent(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    map.setView([lat,lon],36);

    L.marker([lat,lon]).addTo(map)
      .bindPopup("現在地").openPopup();
  });
}

// =====================
// 宮古島
// =====================
function showMiyako(){
  map.setView([24.8,125.28],36);

  Object.values(stops).forEach(s=>{
    L.circleMarker([s.stop_lat,s.stop_lon],{radius:4})
      .addTo(map);
  });
}

// =====================
// 路線表示
// =====================
function drawRoute(){
  for(let sid in shapes){
    L.polyline(shapes[sid],{
      color:"blue",
      weight:10
    }).addTo(map);
  }
}

// =====================
// 角度
// =====================
function getAngle(p1,p2){
  let dx = p2[1]-p1[1];
  let dy = p2[0]-p1[0];
  return Math.atan2(dy,dx)*180/Math.PI;
}

// =====================
// shape位置
// =====================
function getPointOnShape(shape, ratio){

  let total=0;
  let segs=[];

  for(let i=0;i<shape.length-1;i++){
    let dx=shape[i][0]-shape[i+1][0];
    let dy=shape[i][1]-shape[i+1][1];
    let d=Math.sqrt(dx*dx+dy*dy);
    segs.push(d);
    total+=d;
  }

  let target=total*ratio;
  let sum=0;

  for(let i=0;i<segs.length;i++){
    if(sum+segs[i]>=target){
      let t=(target-sum)/segs[i];
      return [
        shape[i][0]+(shape[i+1][0]-shape[i][0])*t,
        shape[i][1]+(shape[i+1][1]-shape[i][1])*t
      ];
    }
    sum+=segs[i];
  }

  return shape[shape.length-1];
}

// =====================
// ETA
// =====================
function getETA(times, nowSec){
  for(let i=0;i<times.length;i++){
    let t = toSec(times[i].arrival_time);
    if(t > nowSec){
      return {
        stopId: times[i].stop_id,
        min: Math.floor((t-nowSec)/60)
      };
    }
  }
  return null;
}

// =====================
// バス運行
// =====================
function startRealtime(){

  busMarkers.forEach(b=>map.removeLayer(b));
  busMarkers=[];

  let routeId = document.getElementById("routeSelect").value;

  let targetTrips = Object.values(trips)
    .filter(t=>t.route_id===routeId)
    .slice(0,5);

  targetTrips.forEach(trip=>{

    let times = stopTimes
      .filter(s=>s.trip_id===trip.trip_id)
      .sort((a,b)=>a.stop_sequence-b.stop_sequence);

    let marker = L.marker([0,0],{
      icon: L.divIcon({
        html:"<div class='busIcon'>🚌</div>",
        className:""
      })
    }).addTo(map);

    busMarkers.push(marker);

    let shape = shapes[trip.shape_id];
    let prevPos = null;

    function update(){

      let now = new Date();
      let sec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();

      let start = toSec(times[0].departure_time);
      let end = toSec(times[times.length-1].arrival_time);

      if(sec < start || sec > end){
        requestAnimationFrame(update);
        return;
      }

      let ratio = (sec-start)/(end-start);
      let pos = getPointOnShape(shape, ratio);

      marker.setLatLng(pos);

      // 回転
      if(prevPos){
        let angle = getAngle(prevPos,pos);
        let el = marker.getElement();
        if(el) el.style.transform = `rotate(${angle}deg)`;
      }

      prevPos = pos;

      // ETA
      let eta = getETA(times, sec);
      if(eta){
        let stop = stops[eta.stopId];
        marker.bindTooltip(
          stop.stop_name + " あと" + eta.min + "分",
          {permanent:true}
        );
      }

      requestAnimationFrame(update);
    }

    update();

  });
}

// =====================
// PWA
// =====================
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
